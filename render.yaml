services:
  - type: web
    name: wafinance-pulse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromValue: https://wafinance-pulse.vercel.app   # cambia por tu URL de Vercel
      - key: SUPABASE_URL
        sync: false   # ingresa manualmente en el dashboard de Render
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
